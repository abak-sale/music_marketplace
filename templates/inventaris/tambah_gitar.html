{% extends 'inventaris/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 bg-white p-4 rounded shadow-sm">
        <h2 class="mb-3">Input Pembelian Gitar</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Simpan Data Gitar</button>
        </form>
    </div>
</div>

<!-- Script Hitung Otomatis Total Modal -->
<script>
    const hargaBeli = document.getElementById('id_harga_beli');
    const biayaTambahan = document.getElementById('id_biaya_tambahan');
    
    function hitungModal() {
        // Logika tambahan opsional jika ingin preview live total modal di form
    }
    hargaBeli.addEventListener('input', hitungModal);
    biayaTambahan.addEventListener('input', hitungModal);
</script>
{% endblock %}
