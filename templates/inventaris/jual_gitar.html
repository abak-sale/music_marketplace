{% extends 'inventaris/base.html' %}
{% load humanize %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 bg-white p-4 rounded shadow-sm">
        <h2 class="mb-3">Proses Penjualan Gitar</h2>
        <div class="mb-3 alert alert-secondary">
            <strong>Brand/Model:</strong> {{ gitar.brand_model }} <br>
            <strong>Nama Gitar:</strong> {{ gitar.nama_gitar }} <br>
            <strong>Total Modal:</strong> Rp {{ gitar.total_modal|floatformat:0|intcomma }}
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Harga Jual (Rp)</label>
                {{ form.harga_jual }}
            </div>
            <button type="submit" class="btn btn-success w-100">Konfirmasi Terjual</button>
            <a href="{% url 'daftar_gitar' %}" class="btn btn-secondary w-100 mt-2">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
