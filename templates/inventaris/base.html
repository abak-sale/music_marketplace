<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Inventaris - Abak Sale{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f9f9f9;
        }
        main {
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- Navbar Khusus Admin Inventaris -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">🎸 Admin Toko Gitar</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="adminNavbar">
                {% if user.is_authenticated %}
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'daftar_gitar' %}">Stok Gitar</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'tambah_gitar' %}">Tambah Gitar</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'laporan' %}">Laporan</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-info" href="{% url 'home' %}">Lihat Website</a></li>
                    <li class="nav-item"><a class="nav-link text-warning" href="/admin/">Panel Django</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="/admin/logout/">Logout</a></li>
                </ul>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="py-2">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-4">
        <div class="container">
            <small>&copy; 2026 Abak Sale Marketplace - Panel Inventaris Internal</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
