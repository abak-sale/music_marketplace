{% extends 'base.html' %}
{% block title %}Email Terkirim - Abak Sale{% endblock %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 450px;">
    <div class="card border-0 shadow-sm rounded-3 p-4 bg-white text-center">
        <div class="mb-3">
            <i class="fa-solid fa-envelope-circle-check text-success" style="font-size: 48px;"></i>
        </div>
        <h3 class="fw-bold mb-2">Cek Email Kamu!</h3>
        <p class="text-muted small mb-0">
            Kami sudah kirim link untuk reset password ke email kamu
            (kalau memang terdaftar di sistem). Cek inbox atau folder spam.
        </p>

        <a href="{% url 'login' %}" class="btn btn-outline-primary w-100 fw-bold mt-4">
            Kembali ke Login
        </a>
    </div>
</div>
{% endblock %}
