{% extends 'base.html' %}
{% block title %}Lupa Password - Abak Sale{% endblock %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 450px;">
    <div class="card border-0 shadow-sm rounded-3 p-4 bg-white">
        <h3 class="fw-bold mb-2">Lupa Password?</h3>
        <p class="text-muted small mb-4">
            Masukkan email yang terdaftar. Kami akan kirim link untuk membuat password baru.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary small">Email</label>
                <input type="email" name="email" class="form-control" placeholder="email@contoh.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">
                Kirim Link Reset
            </button>
        </form>

        <p class="text-center text-muted small mt-3 mb-0">
            <a href="{% url 'login' %}" class="text-decoration-none">← Kembali ke Login</a>
        </p>
    </div>
</div>
{% endblock %}
